
<!DOCTYPE html>
<html lang="en">
<head>
    <title>Attendance Dashboard</title>
</head>
<body>
    <h1>Attendance</h1>
    <table border="1">
        <tr>
            <th>Name</th>
            <th>Date Time</th>
        </tr>

        {% for row in data %}
        <tr>
            <td>{{ row[0] }}</td>
            <td>{{ row[1] }}</td>
        </tr>
        {% endfor %}

    </table>
</body>
</html>
